name: Daily Video Generator

on:
  schedule:
    - cron: '0 12 * * *' 
  workflow_dispatch: 

jobs:
  generate-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # PASO CRÍTICO: Instalación correcta de MoviePy y sus dependencias de sistema
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick policykit-1
          echo "IMAGE_MAGICK_DELEGATES=png,jpeg,tiff" >> $GITHUB_ENV
          pip install --upgrade pip
          pip install elevenlabs replicate requests pillow imageio-ffmpeg moviepy

      - name: Verify Installation
        run: |
          python -c "import moviepy.editor; print('✅ moviepy OK')"
          python -c "import replicate; print('✅ replicate OK')"
          python -c "from PIL import Image; print('✅ pillow OK')"

      - name: Run Generator
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: python main.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: final_video.mp4
          retention-days: 1

name: Daily Video Generator

on:
  schedule:
    - cron: '0 12 * * *' # Se ejecuta todos los días a las 12:00 UTC (7 AM hora Colombia/México)
  workflow_dispatch: # Permite ejecutarlo manualmente si quieres probar

jobs:
  generate-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install elevenlabs replicate moviepy requests pillow

      - name: Run Generator
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: python main.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: generated-video
          path: final_video.mp4

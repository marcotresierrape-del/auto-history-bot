name: Daily Video Generator

on:
  schedule:
    - cron: '0 12 * * *' 
  workflow_dispatch: 

jobs:
  generate-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Upgrade Pip & Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Instalación forzada de versiones estables
          pip install elevenlabs replicate requests pillow
          pip install "moviepy>=1.0.3" imageio-ffmpeg

      - name: Verify Installations
        run: |
          python -c "import moviepy; print('✅ moviepy OK')"
          python -c "from PIL import Image; print('✅ pillow OK')"
          python -c "import replicate; print('✅ replicate OK')"
          python -c "import requests; print('✅ requests OK')"

      - name: Run Generator
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: python main.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: final_video.mp4
          retention-days: 1
